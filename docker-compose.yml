services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sorteador
      POSTGRES_USER: sorteador
      POSTGRES_PASSWORD: sorteador_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sorteador"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      args:
        DEV: "true"
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://sorteador:sorteador_dev@db:5432/sorteador
      DJANGO_SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      ALLOWED_HOSTS: "*"

  web:
    build:
      context: ./frontend
      args:
        DEV: "true"
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

volumes:
  pgdata:
